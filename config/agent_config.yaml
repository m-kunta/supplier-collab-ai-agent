defaults:
  lookback_weeks: 13
  persona_emphasis: both
  include_benchmarks: true
  output_format: docx
  data_dir: data/inbound/mock

llm:
  default_provider: anthropic
  default_model: claude-3-5-sonnet-latest
  temperature: 0.2
  max_tokens: 4096
  retry_count: 3

thresholds:
  # PO risk tiering — days until requested_delivery_date
  po_risk_days_late_red: 3
  po_risk_days_late_yellow: 1

  # PO risk tiering — statuses considered "open" (pipeline at risk)
  po_open_statuses:
    - open
    - confirmed
    - shipped
    - in_transit

  # Promo readiness scoring — 0.0–1.0 composite score
  promo_readiness_red_threshold: 0.80
  promo_readiness_yellow_threshold: 0.95

  # Scorecard trend classification (scope doc §8.1)
  # A metric is "improving" when it shows min_delta improvement for
  # at least consecutive_weeks in a row.
  trend_improvement_consecutive_weeks: 3
  trend_improvement_min_delta: 0.005

  # OOS attribution — recurrence flag threshold (scope doc §6.5)
  # A SKU is flagged as recurring OOS if it appears oos_recurrence_lookback_count
  # or more times within the lookback window.
  oos_recurrence_lookback_count: 2

output:
  output_dir: output/
  footer_text: "Generated by Supplier Collab AI Agent"
